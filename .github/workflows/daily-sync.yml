name: Cloud Intelligence Daily Sync

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  
  # Allow manual trigger from the GitHub Actions UI or via webhook
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_and_commit:
    runs-on: ubuntu-latest
    name: Sync Google Cloud Badges

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for all tags and branches
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sync Engine
        run: npm run sync
        
      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes > 0
        run: |
          git config --global user.name "Cloud Intelligence Bot"
          git config --global user.email "bot@cloudintelligence.com"
          git add src/content/ public/media/
          git commit -m "🤖 auto-sync: fetch latest Google Cloud skill badges"
          git push
